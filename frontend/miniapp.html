<!DOCTYPE html>
<html>
<head>
  <title>Sticker Mini App</title>
  <link rel="stylesheet" href="miniapp.css">
</head>
<body>
  <h1>Upload Logo</h1>
  <input type="file" id="logoInput" accept=".svg">
  <input type="color" id="logoColor" value="#000000">
  <input type="range" id="logoScale" min="0.1" max="2" step="0.1" value="1">
  <button id="nextBtn">Next</button>
  <script src="miniapp.js"></script>
</body>
</html>
